# Nightly scheduled build. Useful for catching issues with submodule (JUCE, etc.)
# or toolchain drift that wouldn't otherwise hit CI between commits.
name: Nightly

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  nightly:
    uses: ./.github/workflows/build_and_test.yml
    secrets: inherit
    # Must grant at least what the nested clang-tidy job requests; callees can
    # only narrow permissions, never widen them. Harmless on a scheduled run
    # (there's no PR to comment on) but required for the workflow to validate.
    permissions:
      contents: read
      pull-requests: write
